name: Release
on:
  push:
    tags: ["v*"]
jobs:
  pypi-server:
    runs-on: ubuntu-latest
    environment: pypi          # PyPI pending publisher for project `holdmyagent`
    permissions: { id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build && python -m build server -o dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist/ }
  pypi-sdk:
    runs-on: ubuntu-latest
    environment: pypi-sdk      # PyPI pending publisher for project `hold-sdk`
    permissions: { id-token: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build && python -m build sdk -o dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with: { packages-dir: dist/ }
  github-release:
    runs-on: ubuntu-latest
    needs: [pypi-server, pypi-sdk]
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install build && python -m build server -o dist/ && python -m build sdk -o dist/
      - uses: softprops/action-gh-release@v2
        with: { files: dist/*, generate_release_notes: true }
  docker:
    runs-on: ubuntu-latest
    permissions: { packages: write, contents: read }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/holdmyagent/arbiter:latest
            ghcr.io/holdmyagent/arbiter:${{ github.ref_name }}
