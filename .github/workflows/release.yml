name: Release
on:
  push:
    tags: ["v*"]
permissions: {}
jobs:
  test:
    # Full CI matrix must pass before anything publishes (tag on a red commit
    # must never reach PyPI/ghcr).
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
  pypi-server:
    runs-on: ubuntu-latest
    needs: test
    environment: pypi          # PyPI trusted publisher for project `holdmyagent`
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.12" }
      - name: Guard - tag must match server version
        run: |
          v=$(python3 -c "import tomllib; print(tomllib.load(open('server/pyproject.toml','rb'))['project']['version'])")
          if [ "v$v" != "$GITHUB_REF_NAME" ]; then
            echo "::error::tag $GITHUB_REF_NAME does not match holdmyagent version $v - refusing to publish"
            exit 1
          fi
      - run: pip install build && python -m build server -o dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: dist-server, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with: { packages-dir: dist/, skip-existing: true }
  pypi-sdk:
    runs-on: ubuntu-latest
    needs: test
    environment: pypi-sdk      # PyPI trusted publisher for project `hold-sdk`
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.12" }
      - run: pip install build && python -m build sdk -o dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: dist-sdk, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with: { packages-dir: dist/, skip-existing: true }
  pypi-warden:
    runs-on: ubuntu-latest
    needs: test
    environment: pypi-warden   # PyPI trusted publisher for project `hold-warden`
    permissions: { id-token: write, contents: read }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with: { python-version: "3.12" }
      - run: pip install build && python -m build warden -o dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with: { name: dist-warden, path: dist/ }
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with: { packages-dir: dist/, skip-existing: true }
  github-release:
    runs-on: ubuntu-latest
    needs: [pypi-server, pypi-sdk, pypi-warden]
    permissions: { contents: write }
    steps:
      # Build-once: attach the exact dists the pypi jobs built and published,
      # never a rebuild (review #8).
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with: { pattern: dist-*, merge-multiple: true, path: dist/ }
      - uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with: { files: dist/*, generate_release_notes: true }
  docker:
    runs-on: ubuntu-latest
    needs: [pypi-server, pypi-sdk, pypi-warden]   # a failed publish must not move :latest
    permissions: { packages: write, contents: read }
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with: { registry: ghcr.io, username: "${{ github.actor }}", password: "${{ secrets.GITHUB_TOKEN }}" }
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/holdmyagent/arbiter:latest
            ghcr.io/holdmyagent/arbiter:${{ github.ref_name }}
