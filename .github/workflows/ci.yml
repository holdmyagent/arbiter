name: CI
on:
  push:
    branches: ["**"]
  pull_request:
  workflow_call:
permissions:
  contents: read
# Supersede in-progress runs on the same ref instead of racing them (a
# multi-ref force-push otherwise spawns simultaneous runs that step on each other).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python: ["3.11", "3.12", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with: { python-version: "${{ matrix.python }}" }
      - run: pip install ruff && ruff check server sdk warden
      # warden is installed alongside server: two §16 isolation gates
      # (test_rotation_anchor, test_verdict_tenant_binding) verify the server's
      # tenant-bound verdicts through hold_warden's VerdictVerifier.
      - run: pip install -e 'server[dev]' -e warden && pytest server/tests
      - run: pytest server/tests/isolation -q
      - run: pip install -e 'sdk[dev]' && pytest sdk/tests
      - run: pytest warden/tests
      - run: bash scripts/smoke.sh
      - run: bash scripts/smoke-warden.sh
      - run: bash scripts/smoke-multitenant.sh
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - run: docker build -f deploy/Dockerfile -t hma-ci-test .
